<!-- メイン -->
  <main>
    <h2>お問い合わせ</h2>
    <p>お仕事のご相談、デザインのご依頼、ポートフォリオへのフィードバックなど、お気軽にご連絡ください。</p>

    <!-- mailto: 版（メールアプリを開く） -->
    <form action="eagleclaws0811@gmail.com" method="post" enctype="text/plain">
      <div class="form-row">
        <label for="name">お名前 <span aria-hidden="true">＊</span></label>
        <input id="name" name="お名前" type="text" required>
      </div>

      <div class="form-row">
        <label for="email">メールアドレス <span aria-hidden="true">＊</span></label>
        <input id="email" name="メールアドレス" type="email" required>
      </div>

      <div class="form-row">
        <label for="subject">件名</label>
        <input id="subject" name="件名" type="text" placeholder="例）制作のご相談">
      </div>

      <div class="form-row">
        <label for="message">メッセージ <span aria-hidden="true">＊</span></label>
        <textarea id="message" name="メッセージ" rows="6" required></textarea>
      </div>

      <!-- 簡易スパム対策（人間は触らないフィールド） -->
      <div class="form-row" style="position:absolute; left:-9999px;">
        <label for="website">もしここに何か入力されていたらスパム</label>
        <input id="website" name="website" type="text" tabindex="-1" autocomplete="off">
      </div>

      <button class="btn" type="submit">送信</button>
    </form>

    <p style="margin-top:12px; font-size:14px; opacity:.8;">
      ※ 「送信」を押すと、お使いのメールアプリが起動します。メールアプリ未設定の端末では動作しない場合があります。
    </p>
  </main>
